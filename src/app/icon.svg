<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Hair -->
  <rect x="8" y="2" width="16" height="2" fill="#3A2818"/>
  <rect x="6" y="4" width="20" height="2" fill="#3A2818"/>
  <rect x="6" y="6" width="20" height="2" fill="#3A2818"/>
  <!-- Face -->
  <rect x="8" y="8" width="16" height="12" fill="#F5D0A9"/>
  <rect x="6" y="10" width="2" height="8" fill="#F5D0A9"/>
  <rect x="24" y="10" width="2" height="8" fill="#F5D0A9"/>
  <!-- Green eyes -->
  <rect x="10" y="12" width="4" height="4" fill="#22C55E"/>
  <rect x="18" y="12" width="4" height="4" fill="#22C55E"/>
  <!-- Pupils -->
  <rect x="12" y="12" width="2" height="2" fill="#166534"/>
  <rect x="20" y="12" width="2" height="2" fill="#166534"/>
  <!-- Eye shine -->
  <rect x="10" y="12" width="2" height="2" fill="#BBFFD0" opacity="0.6"/>
  <rect x="18" y="12" width="2" height="2" fill="#BBFFD0" opacity="0.6"/>
  <!-- Smile -->
  <rect x="12" y="18" width="2" height="2" fill="#D4956A"/>
  <rect x="14" y="18" width="4" height="2" fill="#E8A07A"/>
  <rect x="18" y="18" width="2" height="2" fill="#D4956A"/>
  <!-- Background circle hint -->
  <rect x="0" y="24" width="32" height="8" fill="#3B82F6" opacity="0.15"/>
</svg>
